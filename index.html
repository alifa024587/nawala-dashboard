<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nawala MinitoTo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    color:white;
    background:
    radial-gradient(circle at top left,#00ffff22 0%,transparent 30%),
    radial-gradient(circle at top right,#ff00ff22 0%,transparent 30%),
    radial-gradient(circle at bottom center,#00ff8822 0%,transparent 30%),
    #050816;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:42px;
    color:#00ffff;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    border-radius:18px;
    padding:25px;
    text-align:center;

    box-shadow:
    0 0 25px rgba(0,255,255,.15);

    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:
    0 0 35px rgba(0,255,255,.35);
}

.card .title{
    color:#8bdcff;
    margin-bottom:10px;
}

.card h2{
    font-size:38px;
    color:#00ffff;
    text-shadow:
    0 0 10px #00ffff;
}

.card h3{
    font-size:18px;
    line-height:1.5;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    font-size:15px;
    border:1px solid #00ffff33;
}

.search-box input:focus{
    box-shadow:0 0 20px #00ffff55;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(12px);
    border-radius:16px;
    overflow:hidden;
}

thead{
    background:#0f172a;
}

th{
    padding:16px;
    color:#00ffff;
    text-align:left;
    border-bottom:1px solid #334155;
}

td{
    padding:15px;
    border-bottom:1px solid #1e293b;
}

tbody tr{
    transition:.25s;
}

tbody tr:hover{
    background:rgba(0,255,255,.08);
}

.badge{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.safe{
    background:#00ff88;
    color:#001b11;
    box-shadow:0 0 15px #00ff88;
}

.blocked{
    background:#ff1744;
    color:white;
    box-shadow:0 0 15px #ff1744;
}

.normal{
    background:#00c853;
    color:white;
    box-shadow:0 0 15px #00ff88;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#8da7c9;
}

.status-online{
    text-align:center;
    margin-bottom:20px;
    color:#00ff88;
    text-shadow:0 0 10px #00ff88;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{opacity:.6;}
    50%{opacity:1;}
    100%{opacity:.6;}
}

</style>

</head>
<body>

<div class="container">

<h1>🚀 Nawala MinitoTo</h1>

<div class="status-online">
🟢 LIVE MONITORING ACTIVE
</div>

<div class="cards">

<div class="card">
<div class="title">TOTAL DOMAIN</div>
<h2 id="totalDomains">0</h2>
</div>

<div class="card">
<div class="title">TOTAL BLOCKED</div>
<h2 id="totalBlocked">0</h2>
</div>

<div class="card">
<div class="title">LAST UPDATE</div>
<h3 id="lastUpdate">-</h3>
</div>

<div class="card">
<div class="title">NEXT CHECK</div>
<h3 id="nextUpdate">-</h3>
</div>

</div>

<div class="search-box">
<input
type="text"
id="search"
placeholder="🔍 Cari domain..."
>
</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Domain</th>
<th>Nawala</th>
<th>Network</th>
<th>Status</th>
<th>Checked At</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="footer">
⚡ Auto Refresh 10 Detik • Cloudflare Pages • Nawala API
</div>

</div>

<script>

let allDomains=[];

async function loadData(){

    try{

        const response=
        await fetch(
            "webstatus.json?time="+Date.now()
        );

        const data=
        await response.json();

        allDomains=
        data.domains||[];

        document.getElementById(
            "totalDomains"
        ).innerText=
        allDomains.length;

        const blocked=
        allDomains.filter(
            d=>d.nawala||d.network
        ).length;

        document.getElementById(
            "totalBlocked"
        ).innerText=
        blocked;

        document.getElementById(
            "lastUpdate"
        ).innerText=
        data.last_update||"-";

        document.getElementById(
            "nextUpdate"
        ).innerText=
        data.next_update||"-";

        renderTable();

    }catch(err){

        console.error(err);

    }
}

function renderTable(){

    const keyword=
    document
    .getElementById("search")
    .value
    .toLowerCase();

    const filtered=
    allDomains.filter(
        d=>d.domain
        .toLowerCase()
        .includes(keyword)
    );

    let html="";

    filtered.forEach(item=>{

        const blocked=
        item.nawala||
        item.network;

        html+=`
        <tr>

            <td>${item.domain}</td>

            <td>
            ${
                item.nawala
                ? '<span class="badge blocked">BLOCKED</span>'
                : '<span class="badge safe">SAFE</span>'
            }
            </td>

            <td>
            ${
                item.network
                ? '<span class="badge blocked">BLOCKED</span>'
                : '<span class="badge safe">SAFE</span>'
            }
            </td>

            <td>
            ${
                blocked
                ? '<span class="badge blocked">BLOCKED</span>'
                : '<span class="badge normal">NORMAL</span>'
            }
            </td>

            <td>${item.checked_at}</td>

        </tr>
        `;
    });

    document.getElementById(
        "tableBody"
    ).innerHTML=html;
}

document
.getElementById("search")
.addEventListener(
    "keyup",
    renderTable
);

loadData();

setInterval(
    loadData,
    10000
);

</script>

</body>
</html>
